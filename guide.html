<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Категорії - Valheim</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

header {
    background: #1e293b;
    padding: 20px;
    text-align: center;
}

header h1 {
    color: #22c55e;
}

nav {
    background: #0f172a;
    padding: 10px;
    text-align: center;
}

nav a {
    color: #38bdf8;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    color: #22c55e;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #334155;
}

h2 {
    color: #facc15;
}
</style>
</head>

<body>

<header>
    <h1>📚 Категорії</h1>
</header>

<nav>
    <a href="index.html">Головна</a>
    <a href="guide.html">Категорії</a>
</nav>

<div class="container">

    <div class="card">
        <h2>⚔️ Зброя</h2>
        <p>Мечі, луки, сокири та інша зброя.</p>
    </div>

    <div class="card">
        <h2>🛡 Броня</h2>
        <p>Шоломи, нагрудники та сет броні.</p>
    </div>

    <div class="card">
        <h2>🧪 Зілля</h2>
        <p>Бафи, лікування та витривалість.</p>
    </div>

    <div class="card">
        <h2>👹 Моби</h2>
        <p>Вороги, боси та істоти світу.</p>
    </div>

    <div class="card">
        <h2>⛏ Руди</h2>
        <p>Мідь, залізо, срібло та інші ресурси.</p>
    </div>

</div>

</body>
</html>
