<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🔥 Топ знижок Steam</title>
<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #38bdf8;
    margin-top: 20px;
}

#games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.game {
    background: #1e293b;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    width: 250px;
    cursor: pointer;
    transition: 0.3s;
}

.game:hover {
    transform: scale(1.05);
    background: #334155;
}

.game img {
    width: 100%;
    border-radius: 8px;
}
</style>
</head>
<body>

<h1>🔥 Топ знижок Steam</h1>
<div id="games">Завантаження...</div>

<script>
const PROXY = "https://corsproxy.io/?";

// Список популярных игр (AppID)
const gamesList = [
    105600, // Terraria
    1091500, // Cyberpunk 2077
    578080, // PUBG
    945360, // Valheim
    292030, // The Witcher 3
];

async function loadGames() {
    const container = document.getElementById("games");
    container.innerHTML = "";

    for (let appid of gamesList) {
        try {
            const res = await fetch(`${PROXY}https://store.steampowered.com/api/appdetails?appids=${appid}&cc=ua&l=uk`);
            const data = await res.json();
            const game = data[appid].data;

            if (!game || !game.price_overview) continue;

            const price = (game.price_overview.final / 100).toFixed(2);
            const discount = game.price_overview.discount_percent;
            const img = game.header_image;
            const name = game.name;

            const div = document.createElement("div");
            div.className = "game";
            div.onclick = () => window.open(`https://store.steampowered.com/app/${appid}?cc=ua`, "_blank");
            div.innerHTML = `
                <h2>${name}</h2>
                <img src="${img}" alt="${name}">
                <p>Знижка: -${discount}%</p>
                <p>Ціна: ${price} ₴</p>
            `;

            container.appendChild(div);

        } catch (e) {
            console.error("Помилка при завантаженні", appid, e);
        }
    }
}

loadGames();
</script>

</body>
</html>
