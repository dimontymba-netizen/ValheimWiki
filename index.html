<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🔥 Знижки Steam</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #38bdf8;
}

.game {
    background: #1e293b;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    width: 320px;
    cursor: pointer;
    transition: 0.3s;
}

.game:hover {
    transform: scale(1.05);
    background: #334155;
}

img {
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 Топ знижок Steam</h1>
<div id="games">Завантаження...</div>

<script>
async function loadGames() {
    try {
        let res = await fetch("https://corsproxy.io/?https://store.steampowered.com/api/featuredcategories?cc=ua&l=uk");
        let data = await res.json();

        let html = "";

        data.specials.items.slice(0, 8).forEach(game => {
            let priceUAH = game.final_price / 100;

            html += `
            <div class="game" onclick="openGame(${game.id})">
                <h2>${game.name}</h2>
                <img src="${game.header_image}" width="250"><br>
                <p>Знижка: -${game.discount_percent}%</p>
                <p>Ціна: ${priceUAH.toFixed(2)} ₴</p>
            </div>
            `;
        });

        document.getElementById("games").innerHTML = html;

    } catch (e) {
        document.getElementById("games").innerHTML = "❌ Помилка завантаження";
        console.error(e);
    }
}

function openGame(id) {
    window.open(`https://store.steampowered.com/app/${id}?cc=ua`, "_blank");
}

loadGames();
</script>
</body>
</html>
